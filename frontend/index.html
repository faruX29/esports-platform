<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="google-site-verification" content="iFFC_P1uROL2MG9OW04RDPs3am5mvkfbMcl1ojjAVyI" />
    <link rel="icon" type="image/svg+xml" href="/fext-mascot.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0B0F19" />

    <!-- Tema (açık/koyu) — render'dan ÖNCE ayarla ki yanıp sönme olmasın (FOUC yok) -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('fext-theme');
          if (t !== 'light' && t !== 'dark') {
            t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
          }
          document.documentElement.setAttribute('data-theme', t);
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute('content', t === 'light' ? '#f5f7fb' : '#0B0F19');
        } catch (e) {}
      })();
    </script>

    <!-- PWA — ana ekrana eklenebilir + bildirim altyapısı (mobil app iskeleti) -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="feXt" />

    <!-- Inter — veri-yoğun UI; Baloo 2 — feXt marka wordmark'ı (yuvarlak/oyunbaz) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet" />

    <!-- Varsayılan SEO (sayfa-bazlı etiketler React SeoHead ile override edilir) -->
    <title>feXt — Espor Maçları, Skorlar ve Haberler</title>
    <meta name="description" content="Valorant, CS2 ve LoL espor maçları, canlı skorlar, turnuva takibi, oyuncu istatistikleri ve AI destekli haber bülteni — feXt." />

    <!-- Open Graph varsayılanı -->
    <meta property="og:site_name" content="feXt" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="feXt — Espor Maçları, Skorlar ve Haberler" />
    <meta property="og:description" content="Valorant, CS2 ve LoL espor maçları, canlı skorlar, turnuva takibi ve AI haber bülteni." />
    <meta name="twitter:card" content="summary" />

    <!-- Yapısal veri (Schema.org) — Google'da marka bilgisi + site-içi arama kutusu -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://fextesports.com/#organization",
          "name": "feXt",
          "url": "https://fextesports.com/",
          "logo": "https://fextesports.com/icons/icon-512.png",
          "sameAs": [
            "https://instagram.com/fextesports",
            "https://x.com/fextesports",
            "https://www.tiktok.com/@fextesports"
          ]
        },
        {
          "@type": "WebSite",
          "@id": "https://fextesports.com/#website",
          "url": "https://fextesports.com/",
          "name": "feXt",
          "inLanguage": "tr-TR",
          "publisher": { "@id": "https://fextesports.com/#organization" },
          "potentialAction": {
            "@type": "SearchAction",
            "target": { "@type": "EntryPoint", "urlTemplate": "https://fextesports.com/search?q={search_term_string}" },
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Service Worker kaydı (PWA). Yalnızca prod/https'te; hata sayfayı bozmaz. -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {})
        })
      }
    </script>
  </body>
</html>
