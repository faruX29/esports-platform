name: Sync Esports Matches

on:
  schedule:
    # Her saat başı çalış
    - cron: '0 * * * *'

  # Manuel çalıştırma seçeneği
  workflow_dispatch:
    inputs:
      force_rosters:
        description: 'Tüm kadroları yeniden çek (force)'
        required: false
        default: 'false'
        type: boolean

# Concurrency: Aynı anda sadece 1 çalışsın
concurrency:
  group: sync-matches
  cancel-in-progress: false

jobs:
  match-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate backend path
        run: |
          test -d .
          test -f run.py
          test -f requirements.txt

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate config import
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PANDASCORE_TOKEN: ${{ secrets.PANDASCORE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -c "from config import Config; print('✅ Config OK')"

      - name: Sync matches + predict + extract stats
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PANDASCORE_TOKEN: ${{ secrets.PANDASCORE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python run.py --all-games --limit 50 --predict --stats

      - name: Generate AI news articles
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PANDASCORE_TOKEN: ${{ secrets.PANDASCORE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python run.py --generate-news --news-hours 2

      - name: Notify on failure
        if: failure()
        run: echo "❌ Match sync failed! Check logs above for the exact error."

  roster-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate backend path
        run: |
          test -d .
          test -f run.py
          test -f requirements.txt

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate config import
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PANDASCORE_TOKEN: ${{ secrets.PANDASCORE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -c "from config import Config; print('✅ Config OK')"

      - name: Sync active player rosters (incremental, son 90 gün)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PANDASCORE_TOKEN: ${{ secrets.PANDASCORE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force_rosters }}" = "true" ]; then
            FORCE_FLAG="--roster-force"
          fi
          python run.py --players --roster-days 90 $FORCE_FLAG

      - name: Notify on failure
        if: failure()
        run: echo "❌ Roster sync failed! Check logs above for the exact error."
