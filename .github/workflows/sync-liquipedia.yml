name: Sync Liquipedia (hybrid stats + transfers)

# Liquipedia rate-limit'ine saygı için GÜNLÜK (saatlik değil). Hybrid harita/KDA
# backfill + transfer senkronu. v3 API birincil, key yoksa wikitext yedek.
on:
  schedule:
    - cron: '0 5 * * *'   # her gün 05:00 UTC
  workflow_dispatch:

concurrency:
  group: sync-liquipedia
  cancel-in-progress: false

jobs:
  liquipedia-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Hybrid stats backfill (map + player KDA → player_match_stats)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PANDASCORE_TOKEN: ${{ secrets.PANDASCORE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LIQUIPEDIA_API_KEY: ${{ secrets.LIQUIPEDIA_API_KEY }}
        run: python run.py --hybrid-stats --hybrid-limit 50

      - name: Sync transfers (v3 → roster_changes)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PANDASCORE_TOKEN: ${{ secrets.PANDASCORE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LIQUIPEDIA_API_KEY: ${{ secrets.LIQUIPEDIA_API_KEY }}
        run: python run.py --sync-transfers --transfer-days 14

      - name: Apply transfers to rosters (Liquipedia → players.team_pandascore_id)
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python apply_roster_changes.py --apply

      - name: Generate transfer news (LLM, bekleyen roster_changes)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PANDASCORE_TOKEN: ${{ secrets.PANDASCORE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LIQUIPEDIA_API_KEY: ${{ secrets.LIQUIPEDIA_API_KEY }}
        run: python run.py --generate-transfers

      - name: Generate match previews (yaklaşan S/A + B-tier büyük turnuva, 72s)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PANDASCORE_TOKEN: ${{ secrets.PANDASCORE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LIQUIPEDIA_API_KEY: ${{ secrets.LIQUIPEDIA_API_KEY }}
        run: python run.py --generate-previews --preview-hours 72

      - name: Generate tournament recaps (biten tier S/A turnuva sonuç özetleri)
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PANDASCORE_TOKEN: ${{ secrets.PANDASCORE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LIQUIPEDIA_API_KEY: ${{ secrets.LIQUIPEDIA_API_KEY }}
        run: python run.py --generate-tournament-recaps

      # Küratör yıldız-oyuncu enrichment (Gemini hibrit strateji): en popüler ~50
      # oyuncuya kariyer/sosyal/yaş çek. Liquipedia 429'ladığı için DÜŞÜK hacim
      # (limit 5/gün) + işlenmişi atla (adapter targeted mod) → ~2 haftada liste dolar,
      # compliance'a saygılı. Geri kalan 5300+ oyuncuda veri boşsa UI zaten gizliyor.
      - name: Curated star-player enrichment (career/social/age, düşük hacim)
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LIQUIPEDIA_API_KEY: ${{ secrets.LIQUIPEDIA_API_KEY }}
          LIQUIPEDIA_PLAYER_TARGETS: "s1mple,ZywOo,NiKo,donk,m0NESY,device,ropz,sh1ro,blameF,Twistzz,broky,huNter,electronic,Ax1Le,XANTARES,woxic,Spinx,jL,frozen,degster,Faker,Chovy,Caps,Knight,Ruler,Keria,Gumayusi,Zeus,Oner,Peanut,ShowMaker,Canyon,Viper,Deft,Scout,Bin,Elk,Wei,aspas,Derke,TenZ,yay,Chronicle,Alfajer,Boaster,Less,Sacy,nAts,Zekken,cNed,Jinggg,f0rsakeN,Demon1,Zellsis,Leo,Marved,crashies"
        run: python run.py --liquipedia-enrich --liquipedia-sections players --liquipedia-limit 5

      # NOT: SEO sitemap artık dinamik Vercel Edge route (frontend/api/sitemap.js,
      # Gemini #15) — statik dosya üretimi/commit'i kaldırıldı. Sitemap istek anında
      # Supabase'den üretilir. Bu workflow'da sitemap adımı yok.

      - name: Notify on failure
        if: failure()
        run: echo "❌ Liquipedia sync failed! Check logs above."
