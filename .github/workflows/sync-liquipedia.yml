name: Sync Liquipedia (hybrid stats + transfers)

# Liquipedia rate-limit'ine saygı için GÜNLÜK (saatlik değil). Hybrid harita/KDA
# backfill + transfer senkronu. v3 API birincil, key yoksa wikitext yedek.
on:
  schedule:
    - cron: '0 5 * * *'   # her gün 05:00 UTC
  workflow_dispatch:

concurrency:
  group: sync-liquipedia
  cancel-in-progress: false

jobs:
  liquipedia-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Hybrid stats backfill (map + player KDA → player_match_stats)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PANDASCORE_TOKEN: ${{ secrets.PANDASCORE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LIQUIPEDIA_API_KEY: ${{ secrets.LIQUIPEDIA_API_KEY }}
        run: python run.py --hybrid-stats --hybrid-limit 50

      - name: Sync transfers (v3 → roster_changes)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PANDASCORE_TOKEN: ${{ secrets.PANDASCORE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LIQUIPEDIA_API_KEY: ${{ secrets.LIQUIPEDIA_API_KEY }}
        run: python run.py --sync-transfers --transfer-days 14

      - name: Generate transfer news (LLM, bekleyen roster_changes)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PANDASCORE_TOKEN: ${{ secrets.PANDASCORE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LIQUIPEDIA_API_KEY: ${{ secrets.LIQUIPEDIA_API_KEY }}
        run: python run.py --generate-transfers

      # SEO sitemap: yeni maç/haber/takım sayfaları Google'a keşfettirilsin.
      # SITE_URL secret'ı yoksa generator placeholder domain kullanır (Config.SITE_URL).
      - name: Generate SEO sitemap
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PANDASCORE_TOKEN: ${{ secrets.PANDASCORE_TOKEN }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: python run.py --generate-sitemap

      # Deploy HENÜZ yok → sitemap'i şimdilik artifact olarak sakla (incelenebilir).
      # ⚠️ Deploy kurulunca (Vercel/Netlify git-push): bu adımı sitemap'i repo'ya
      # commit-back eden bir adımla değiştir; git-tetikli deploy dosyaları alır.
      - name: Upload sitemap artifact
        uses: actions/upload-artifact@v4
        with:
          name: sitemap
          path: frontend/public/sitemap*.xml
          if-no-files-found: error
          retention-days: 7

      - name: Notify on failure
        if: failure()
        run: echo "❌ Liquipedia sync failed! Check logs above."
