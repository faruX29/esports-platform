name: Sync Esports Matches

on:
  schedule:
    # Her saat başı çalış (15 dakika yerine - daha az yük)
    - cron: '0 * * * *'
  
  # Manuel çalıştırma seçeneği
  workflow_dispatch:
    inputs:
      force_rosters:
        description: 'Tüm kadroları yeniden çek (force)'
        required: false
        default: 'false'
        type: boolean

# Concurrency: Aynı anda sadece 1 çalışsın
concurrency:
  group: sync-matches
  cancel-in-progress: false  # Eski işi iptal etme, bekle

jobs:
  sync-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Max 10 dakika
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt --break-system-packages
      
      - name: Sync matches + predict + extract stats
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PANDASCORE_TOKEN: ${{ secrets.PANDASCORE_TOKEN }}
        run: |
          cd backend
          python run.py --all-games --limit 50 --predict --stats

      - name: Sync active player rosters (incremental, son 90 gün)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PANDASCORE_TOKEN: ${{ secrets.PANDASCORE_TOKEN }}
        run: |
          cd backend
          # Manuel tetiklemede force=true ise tüm kadroları yenile
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force_rosters }}" = "true" ]; then
            FORCE_FLAG="--roster-force"
          fi
          python run.py --players --roster-days 90 $FORCE_FLAG

      - name: Notify on failure
        if: failure()
        run: echo "❌ Sync failed! Check logs."